<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />

    <link
      rel="stylesheet"
      type="text/css"
      href="./style/style.css"
    />

    <title>Psychic Garden</title>
  </head>

  <body>
    <main class="home">
      <!-- Couche principale -->
      <section class="first-layer">
        <div class="img-container">
          <img
            src="./assets/logos/psychic-garden-logo3.svg"
            alt="Psychic Garden"
            class="img-logo"
          />
        </div>
      </section>

      <!-- Noms flottants : desktop uniquement -->
      <div class="plant-labels">
        <div class="container-name1">
          <p class="name-index">
            Peyote
            <br />
            <span>Lophora Williamsii</span>
          </p>

          <p class="number">1</p>
        </div>

        <div class="container-name2">
          <p class="name-index">
            Copelandia
            <br />
            <span>Psilocybe Cubensis</span>
          </p>

          <p class="number">2</p>
        </div>

        <div class="container-name3">
          <p class="name-index">
            Chacruna
            <br />
            <span>Psychotria Viridis</span>
          </p>

          <p class="number">3</p>
        </div>
      </div>

      <!-- Bouton -->
      <div class="library-btn">
        <a href="library.html">Library</a>
      </div>

      <!-- Couche interactive : desktop uniquement -->
      <section
        class="second-layer"
        aria-hidden="true"
        data-hero
      >
        <h1>Psychic Garden</h1>

        <img
          src="./assets/illus/illustration-01.svg"
          alt=""
          class="illu1"
        />

        <img
          src="./assets/illus/illustration-02.svg"
          alt=""
          class="illu2"
        />

        <img
          src="./assets/illus/illustration-03.svg"
          alt=""
          class="illu3"
        />
      </section>
    </main>

    <!-- Footbar -->
    <footer class="footbar">
      <p class="footbar-left">
        Psychic Garden
        <span> Online encyclopedia of sacred plants.</span>
      </p>
    </footer>

    <script src="./js/script.js"></script>

    <script>
      const hero = document.querySelector("[data-hero]");
      const pointerCanHover = window.matchMedia(
        "(hover: hover) and (pointer: fine)"
      );

      function updateHeroMask(event) {
        if (!hero || !pointerCanHover.matches) {
          return;
        }

        const x = Math.round(
          (event.clientX / window.innerWidth) * 100
        );

        const y = Math.round(
          (event.clientY / window.innerHeight) * 100
        );

        hero.style.setProperty("--x", `${x}%`);
        hero.style.setProperty("--y", `${y}%`);
      }

      if (pointerCanHover.matches) {
        window.addEventListener("mousemove", updateHeroMask);
      }
    </script>
  </body>
</html>
