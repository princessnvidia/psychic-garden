<script>
  // ... (colle ici renderCatalogFromJSON)

  fetch("list2.json")  // adapte le chemin si besoin
    .then(r => r.json())
    .then(json => {
      renderCatalogFromJSON(json, ".container");

<div class="scroll-container">
  <img src="./assets/logos/psychic-garden-logo.svg" alt="logo" class="logo-scroll">
  <div class="dotscroll">
    <img src="./assets/svg/dots-scroll.svg" alt="dots" id="dot1">
    <img src="./assets/svg/dots-scroll.svg" alt="dots" id="dot2">
    <img src="./assets/svg/dots-scroll.svg" alt="dots" id="dot3">
  </div>
</div>




<div class="navbar"><div class="nav-txt"><p>Psychic Garden</p> <a href="index.html">Home</a></div>  </div>
<div class="background"></div>

<!--_____________________________________-->
  
<div class="container"></div>


<!--FOOTBAR_____________________________________-->

   <div class="footbar">
    <p class="footbar-left">
        Psychic Garden 
        <span>Online encyclopedia of sacred plants.</span>
    </p>
</div>


<!--_____________________________________-->
<script>
  window.onscroll = function() {myFunction()};
  
  var navbar = document.getElementById("navbar");
  var sticky = navbar.offsetTop;
  
  function myFunction() {
    if (window.pageYOffset >= sticky) {
      navbar.classList.add("sticky")
    } else {
      navbar.classList.remove("sticky");
    }
  }
  </script>


<script>

  let dot1 = document.getElementById("dot1");
  let dot2 = document.getElementById("dot2");
  let dot3 = document.getElementById("dot3");

  window.addEventListener("scroll", function(){

    let value = window.scrollY;
    
    dot1.style.marginTop = value * 0.50 + "px";
    dot2.style.marginBottom = value * 0.50 + "px";
    dot3.style.marginTop = value * 0.50 + "px";
   
  })

</script>

<script>
  // Rend chaque item en <a class="name" target="_blank">
  function renderCatalogFromJSON(data, containerSel = ".container") {
    const container = document.querySelector(containerSel);
    if (!container) return;

    container.innerHTML = "";
    const order = Object.keys(data); // ou ["Cactus","Plants","Mushrooms"]

    order.forEach(category => {
      const col = document.createElement("div");
      col.className = "txt-cont";
      col.id = "background-sticky";

      const title = document.createElement("p");
      title.className = "sticky-list";
      title.textContent = category;
      col.appendChild(title);

      (data[category] || []).forEach(item => {
        const a = document.createElement("a");
        a.className = "name";
        a.target = "_blank";
        a.rel = "noopener";

        // URL depuis le JSON (sinon fallback Wikipédia)
        const guess = (item.latin || item.name || "").trim().replace(/\s+/g, "_");
        a.href = item.url || ("https://en.wikipedia.org/wiki/" + encodeURIComponent(guess));

        // Texte + latin en <span> (même présentation que tes <p>)
        a.append(document.createTextNode(item.name || ""));
        a.append(" ");
        const span = document.createElement("span");
        span.textContent = item.latin || "";
        a.appendChild(span);

        col.appendChild(a);
      });

      container.appendChild(col);
    });
  }

  // Exemple d’usage avec ton JSON complet :
  // fetch("psychic-garden-full.json").then(r => r.json()).then(renderCatalogFromJSON);
</script>



</body>

</html>
